name: Update README with cowsay

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  
  workflow_dispatch:     

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install cowsay and curl
        run: |
          sudo apt-get update
          sudo apt-get install -y cowsay curl

      - name: Fetch a programming joke
        run: |
          curl -s "https://v2.jokeapi.dev/joke/Programming?blacklistFlags=nsfw,religious,political,racist,sexist,explicit&format=txt" -o joke.txt
          cowsay "$(cat joke.txt)" > cowsay.txt

      - name: Update README.md with the joke
        run: |
          echo '```' > README.md
          cat cowsay.txt >> README.md
          echo '```' >> README.md

      - name: Commit and push changes
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "moo: $(tr -d '\n' < joke.txt)" || echo "no changes to commit"
          git push
